<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" font-family="Segoe UI, Arial, sans-serif">
  <rect width="620" height="320" fill="white"/>
  <text x="310" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Naiver Schnappschuss — Geld verschwindet</text>

  <defs>
    <marker id="d2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
    <marker id="r2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d00"/></marker>
  </defs>

  <!-- Teilnehmer -->
  <rect x="65" y="42" width="110" height="28" fill="#eef" stroke="#333"/>
  <text x="120" y="61" text-anchor="middle" font-size="12.5" fill="#222">Koordinator</text>
  <line x1="120" y1="70" x2="120" y2="298" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="285" y="42" width="90" height="28" fill="#fff" stroke="#333"/>
  <text x="330" y="61" text-anchor="middle" font-size="12.5" fill="#222">P0</text>
  <line x1="330" y1="70" x2="330" y2="298" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="475" y="42" width="90" height="28" fill="#fff" stroke="#333"/>
  <text x="520" y="61" text-anchor="middle" font-size="12.5" fill="#222">P1</text>
  <line x1="520" y1="70" x2="520" y2="298" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Transfer unterwegs, kommt erst spaet an -->
  <line x1="330" y1="105" x2="518" y2="252" stroke="#d00" stroke-width="2.3" marker-end="url(#r2)"/>
  <text x="336" y="117" font-size="11" fill="#d00">Transfer(200)</text>

  <!-- BalanceRequest -->
  <line x1="120" y1="150" x2="328" y2="150" stroke="#333" stroke-width="1.4" marker-end="url(#d2)"/>
  <text x="126" y="144" font-size="11" fill="#333">BalanceRequest</text>
  <line x1="120" y1="168" x2="518" y2="168" stroke="#333" stroke-width="1.4" marker-end="url(#d2)"/>

  <!-- BalanceReplies -->
  <line x1="328" y1="192" x2="122" y2="192" stroke="#333" stroke-width="1.4" marker-end="url(#d2)"/>
  <text x="150" y="186" font-size="11" fill="#333">BalanceReply(800)</text>
  <line x1="518" y1="214" x2="122" y2="214" stroke="#333" stroke-width="1.4" marker-end="url(#d2)"/>
  <text x="330" y="208" font-size="11" fill="#333">BalanceReply(1000)</text>

  <text x="528" y="250" font-size="10" fill="#aaa">kommt erst danach an</text>

  <text x="65" y="292" font-size="12.5" fill="#d00">800 + 1000 = 1800 ≠ S = 2000  →  200 fehlen</text>
</svg>
