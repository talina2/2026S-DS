<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" font-family="Segoe UI, Arial, sans-serif">
  <rect width="620" height="320" fill="white"/>
  <text x="310" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Konsistenter Schnappschuss</text>

  <defs>
    <marker id="d" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d00"/></marker>
  </defs>

  <!-- Teilnehmer -->
  <rect x="65" y="42" width="110" height="28" fill="#eef" stroke="#333"/>
  <text x="120" y="61" text-anchor="middle" font-size="12.5" fill="#222">Koordinator</text>
  <line x1="120" y1="70" x2="120" y2="298" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="285" y="42" width="90" height="28" fill="#fff" stroke="#333"/>
  <text x="330" y="61" text-anchor="middle" font-size="12.5" fill="#222">P0</text>
  <line x1="330" y1="70" x2="330" y2="298" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="475" y="42" width="90" height="28" fill="#fff" stroke="#333"/>
  <text x="520" y="61" text-anchor="middle" font-size="12.5" fill="#222">P1</text>
  <line x1="520" y1="70" x2="520" y2="298" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Transfer unterwegs (kreuzt den Schnitt) -->
  <line x1="330" y1="100" x2="518" y2="238" stroke="#d00" stroke-width="2.3" marker-end="url(#r)"/>
  <text x="336" y="112" font-size="11" fill="#d00">Transfer(200)</text>

  <!-- SnapshotRequest -->
  <line x1="120" y1="142" x2="328" y2="142" stroke="#333" stroke-width="1.4" marker-end="url(#d)"/>
  <text x="126" y="136" font-size="11" fill="#333">SnapshotRequest</text>
  <line x1="120" y1="160" x2="518" y2="160" stroke="#333" stroke-width="1.4" marker-end="url(#d)"/>

  <!-- Schnitt -->
  <line x1="65" y1="180" x2="575" y2="180" stroke="#d00" stroke-width="1.1" stroke-dasharray="6 4"/>
  <text x="575" y="176" text-anchor="end" font-size="10" fill="#d00">Schnitt</text>

  <!-- StateReports -->
  <line x1="328" y1="202" x2="122" y2="202" stroke="#333" stroke-width="1.4" marker-end="url(#d)"/>
  <text x="150" y="196" font-size="11" fill="#333">StateReport(800)</text>
  <line x1="518" y1="222" x2="122" y2="222" stroke="#333" stroke-width="1.4" marker-end="url(#d)"/>
  <text x="330" y="216" font-size="11" fill="#333">StateReport(1000)</text>

  <!-- ChannelReport -->
  <line x1="518" y1="260" x2="122" y2="260" stroke="#d00" stroke-width="2" marker-end="url(#r)"/>
  <text x="150" y="254" font-size="11" fill="#d00">ChannelReport(200)</text>

  <text x="65" y="292" font-size="12.5" fill="#1a8f4a">800 + 1000 + 200 = 2000 = S  ✓</text>
</svg>
